<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Insertar Seguro</title>
</head>
<body class="p-8">

    <script src="../js/session.js"></script>
    <script src="../js/navbar.js"></script>

    <form id="formSeguro" class="max-w-md space-y-3">
        <h2 class="text-2xl font-bold mb-4">registrar seguro</h2>
        <div>
            <label for="id_tipo_seguro" class="label">Tipo de Seguro</label>
            <select id="id_tipo_seguro" name="id_tipo_seguro" required class="select select-bordered w-full">
                <option value="">-- Selecciona --</option>
            </select>
        </div>
        <div>
            <label for="costo_diario" class="label">Precio x Día</label>
            <input type="number" step="0.01" min="0" id="costo_diario" name="costo_diario" required class="input input-bordered w-full">
        </div>
        <div class="flex gap-2 pt-2">
            <button id="btnGuardar" type="button" class="btn btn-primary">guardar seguro</button>
            <button id="btnCancelar" type="button" class="btn">cancelar</button>
        </div>
    </form>

    <script src="../js/seguro.js"></script>
</body>
</html>
