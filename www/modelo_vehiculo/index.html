<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<title>Modelos</title>

</head>
<body class="p-8">

<script src="../js/session.js"></script>
<div id="navbar-container"></div>
<script src="../js/navbar.js"></script>


<div class="max-w-[1500px] mx-auto">
    <div class="flex items-center justify-start p-4" id="btnAgregarContainer">
        <button
            type="button"
            id="btnAgregar"
            class="w-10 h-10 bg-green-500 hover:bg-green-600 text-white font-bold text-xl flex items-center justify-center rounded transition shadow"
            title="Agregar">
            +
        </button>
    </div>
    <section id="tableSection" class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
    <div class="overflow-x-auto">
<table class="table table-zebra w-full" id="tablaModelos">
<thead>

<tr>
<th>ID</th>
<th>Modelo</th>
<th>Marca</th>
<th>Año</th>
<th>Categoría</th>
<th>Costo diario</th>
<th>acciones</th>
</tr>

</thead>
<tbody id="tbody"></tbody>

</table>
</div>
</section>
<section id="formSection" class="hidden mt-6">
            <h1 id="formTitle" class="text-2xl font-bold text-gray-800 mb-6 text-center">
                Modelo de Vehículo
            </h1>

            <form id="formModelo" class="space-y-4 max-w-2xl mx-auto">
                <input type="hidden" id="id_modelo">

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Nombre del modelo
                    </label>
                    <input
                        type="text"
                        id="nombre_modelo"
                        class="input input-bordered w-full"
                        placeholder="Escribe el nombre del modelo">
                </div>

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Marca
                    </label>
                    <input
                        type="text"
                        id="marca"
                        class="input input-bordered w-full"
                        placeholder="Escribe la marca">
                </div>

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Año
                    </label>
                    <input
                        type="number"
                        id="year"
                        class="input input-bordered w-full"
                        placeholder="Escribe el año">
                </div>

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Categoría
                    </label>
                    <select id="categoria" class="select select-bordered w-full">
                        <option value="">-- Selecciona --</option>
                        <option value="Sedan">Sedan</option>
                        <option value="SUV">SUV</option>
                        <option value="Pickup">Pickup</option>
                        <option value="Hatchback">Hatchback</option>
                        <option value="Van">Van</option>
                        <option value="Convertible">Convertible</option>
                    </select>
                </div>

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Costo diario
                    </label>
                    <input
                        type="number"
                        step="0.01"
                        min="0"
                        id="costo_diario"
                        class="input input-bordered w-full"
                        placeholder="Escribe el costo diario">
                </div>

                <div class="flex gap-3 justify-end pt-2">
                    <button type="button" id="btnCancelarAgregar" class="btn btn-outline">
                        Cancelar
                    </button>
                    <button type="submit" id="btnGuardar" class="btn btn-primary">
                        Guardar
                    </button>
                </div>
            </form>
        </section>
    </div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="../js/modelo_vehiculo.js?v=2"></script>

</body>
</html>
