<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Cargos Adicionales</title>
</head>
<body class="p-8">

    <script src="../js/session.js"></script>
    <script src="../js/navbar.js"></script>

    <div id="tableList">
        <button id="addBtn" class="btn btn-primary mb-4 mt-4">+ Agregar Cargo</button>
        <div class="overflow-x-auto">
            <table class="table table-zebra w-full" id="tablaCargos">
                <thead>
                    <tr>
                        <th>ID Cargo</th>
                        <th>Renta / Falla</th>
                        <th>Descripción</th>
                        <th>Monto Total</th>
                        <th>Monto Seguro</th>
                        <th>Garantía Tomada</th>
                        <th>Devolución Garantía</th>
                        <th>Pago Extra</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="formContainer" class="hidden max-w-md bg-white p-6 shadow-xl rounded-2xl border border-gray-100"></div>

    <script type="module" src="../js/cargo_adicional.js"></script>
</body>
</html>
