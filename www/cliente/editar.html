<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Editar Cliente</title>
</head>
<body class="p-8 bg-gray-100">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-4">Editar Cliente</h2>
        <form id="formEditarCliente">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">Editando al Cliente ID:</label>
                <input type="text" id="id_cliente" class="input input-bordered w-full mt-1" readonly>
            </div>
            <div class="mb-4">
                <label for="id_usuario_edit" class="block text-sm font-medium text-gray-700">Nuevo ID de Usuario:</label>
                <select id="id_usuario_edit" class="select select-bordered w-full mt-1" required>
                    <option value="">Cargando IDs...</option>
                </select>
            </div>
            <div class="flex gap-2">
                <button id="btnActualizar" type="button" class="btn btn-primary">Actualizar</button>
                <a href="index.html" class="btn btn-ghost">Cancelar</a>
            </div>
        </form>
    </div>
    
    <script src="../js/cliente.js"></script>
</body>
</html>
