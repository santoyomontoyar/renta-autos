<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Registrar Usuario</title>
</head>
<body class="p-8">

    <script src="../js/session.js"></script>
    <script src="../js/navbar.js"></script>

    <form id="formnuevousuario" class="max-w-md space-y-3">
        <h2 class="text-2xl font-bold mb-4">registrar usuarios</h2>
        <div>
            <label for="Nombre" class="label">Nombre</label>
            <input type="text" id="Nombre" name="Nombre" required class="input input-bordered w-full">
        </div>
        <div>
            <label for="Apellido" class="label">Apellido</label>
            <input type="text" id="Apellido" name="apellido" required class="input input-bordered w-full">
        </div>
        <div>
            <label for="Correo" class="label">Correo</label>
            <input type="email" id="Correo" name="correo" required class="input input-bordered w-full">
        </div>
        <div>
            <label for="telefono" class="label">telefono</label>
            <input type="text" id="telefono" name="telefono" required class="input input-bordered w-full">
        </div>
        <div>
            <label for="Estado" class="label">Estado</label>
            <select id="Estado" name="Estado" required class="select select-bordered w-full">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
                <option value="Suspendido">Suspendido</option>
            </select>
        </div>
        <div>
            <label for="Rol" class="label">Rol</label>
            <select id="Rol" name="Rol" required class="select select-bordered w-full"></select>
        </div>
        <div class="flex gap-2 pt-2">
            <button id="btnGuardar" type="button" class="btn btn-primary">guardar usuario</button>
            <button id="btnCancelar" type="button" class="btn">cancelar</button>
        </div>
    </form>

    <script type="module" src="../js/user.js"></script>
</body>
</html>
