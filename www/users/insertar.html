<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <title>Guardar Usuario</title>
</head>
<body class="p-8 bg-base-200 min-h-screen flex flex-col items-center justify-center">

  <div class="max-w-md w-full card bg-base-100 shadow-xl p-6 space-y-4">
    <h2 id="form-title" class="text-2xl font-bold text-primary border-b border-base-300 pb-2">👤 Registrar Usuario</h2>
    
    <form id="formUsuario" class="space-y-4">
      <input type="hidden" id="id_user" value="">

      <label class="form-control w-full">
        <div class="label"><span class="label-text font-semibold">Nombre de Usuario (Correo)</span></div>
        <input type="text" id="username" class="input input-bordered w-full" required placeholder="ejemplo@correo.com">
      </label>

      <label class="form-control w-full">
        <div class="label"><span class="label-text font-semibold">ID Rol</span></div>
        <input type="number" id="id_role" class="input input-bordered w-full" required placeholder="1 = Admin, 2 = Tecnico">
      </label>

      <label class="form-control w-full">
        <div class="label"><span class="label-text font-semibold">Estado de la Cuenta</span></div>
        <select id="status" class="select select-bordered w-full" required>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </label>

      <div class="flex gap-2 justify-end pt-2">
        <a href="index.html" class="btn btn-ghost">Volver</a>
        <button type="submit" id="btnGuardar" class="btn btn-primary">Guardar Usuario</button>
      </div>
    </form>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const idUser = urlParams.get('id_user');
        
        if (idUser) {
            document.getElementById("form-title").textContent = "✏️ Editar Usuario #" + idUser;
            document.getElementById("id_user").value = idUser;
            document.getElementById("btnGuardar").textContent = "Actualizar";
            
            fetch("../php/user.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "getAll" })
            })
            .then(res => res.json())
            .then(json => {
                if(json.status === "success" && json.data) {
                    const user = json.data.find(u => u.id_user == idUser);
                    if (user) {
                        document.getElementById("username").value = user.username;
                        document.getElementById("id_role").value = user.id_role;
                        document.getElementById("status").value = user.status;
                    }
                }
            });
        }

        document.getElementById("formUsuario").addEventListener("submit", (e) => {
            e.preventDefault();
            const id = document.getElementById("id_user").value;
            
            const payload = {
                action: id ? "update" : "insert",
                email: document.getElementById("username").value,
                username: document.getElementById("username").value,
                id_role: document.getElementById("id_role").value,
                status: document.getElementById("status").value
            };
            if (id) payload.id_user = id;

            fetch("../php/user.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(json => {
                if (json.status === "success") {
                    alert("¡Operación realizada con éxito!");
                    window.location.href = "index.html";
                } else {
                    alert("Error: " + json.message);
                }
            });
        });
    });
  </script>
</body>
</html>
